# Spring and application logging (as specified in docx)
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate SQL logs (as specified in docx)
logging.level.org.hibernate.SQL=trace

# Log pattern (as specified in docx)
logging.pattern.console=%d{HH:mm:ss.SSS} %5p %-25logger{25} %msg%n

# Database configuration (as specified in docx)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password="yout password"

# Hibernate configuration (as specified in docx)
# validate = checks table exists, throws error if not found
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true